# Enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Use the nice_oled custom status screen (module: mctechnology17/zmk-nice-oled)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# --- nice_oled: CENTRAL (left) ---
# WPM widget: Number + Speedometer + Luna (module defaults)
# Modifiers (Ctrl/Shift/Alt/Win) — Box layout, Windows symbols
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y

# Raw HID is enabled in sofle_left.conf (central-only — implies USB_DEVICE_HID
# which breaks the peripheral build because the module's central-only `depends`
# is commented out upstream).

# --- nice_oled: PERIPHERAL (right) ---
# Disable the default Cat animation and use Smart Battery animation instead
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB underglow / backlight support
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Configuration pour couleur blanche au démarrage
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

# Disable external power toggling by the underglow
# This keeps the display on when changing RGB settings
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Configuration d'extinction automatique du RGB
# S'éteint automatiquement après le délai d'inactivité (comme les écrans)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Timeout d'inactivité (1 minute avant mise en veille)
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Timeout avant le mode veille profonde (15 minutes par défaut)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

